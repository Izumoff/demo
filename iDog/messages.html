    <div class="sidebar-foot">
      Demo data, stored only in this browser.
      <div class="sidebar-foot__row">
        <button type="button" class="theme-toggle js-theme-toggle"></button>
        <button type="button" class="js-reset-demo">Reset demo data</button>
      </div>
    </div>

  <div style="flex:1; min-width:0;">
    <header class="topbar">
      <button class="icon-btn js-open-nav" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="brand">
        <div class="brand__mark">BV</div>
        <div class="brand__name" style="font-size:16px">The Pass</div>
      </div>
    </header>

    <main class="main">
      <div class="page-head">
        <div>
          <h1 id="inbox-title">Inbox</h1>
          <div class="page-head__meta" id="inbox-meta"></div>
        </div>
      </div>

      <div class="filter-bar">
        <label for="f-source">Source</label>
        <select id="f-source">
          <option value="">All sources</option>
        </select>

        <label for="f-sentiment">Sentiment</label>
        <select id="f-sentiment">
          <option value="">All</option>
          <option value="positive">Positive</option>
          <option value="negative">Negative</option>
          <option value="neutral">Neutral</option>
        </select>

        <label for="f-read">Read status</label>
        <select id="f-read">
          <option value="">All</option>
          <option value="unread">Unread</option>
          <option value="read">Read</option>
        </select>

        <label for="f-answered">Reply status</label>
        <select id="f-answered">
          <option value="">All</option>
          <option value="unanswered">Awaiting reply</option>
          <option value="answered">Answered</option>
        </select>

        <span class="count" id="result-count"></span>
      </div>

      <div id="ticket-container"></div>
    </main>
  </div>
